<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Universo Católico Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --azul:#1f57c3; --azul-esc:#15418c; --amarelo:#f5b21a; --vermelho:#e8533f;
    --verde:#2fa15a; --roxo:#7c4dd6; --azul-claro:#2f8fd6;
    --bg:#faf9f5; --card:#ffffff; --borda:#ececdf; --texto:#2a2a2a; --suave:#7a7a72;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--texto)}
  h1,h2,h3,h4,.titulo{font-family:'Baloo 2',sans-serif}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  .oculto{display:none!important}

  /* ---------- Tela de carregamento / login ---------- */
  .tela-centro{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login{background:#fff;border:1px solid var(--borda);border-radius:20px;max-width:400px;width:100%;padding:34px 30px;box-shadow:0 14px 50px rgba(20,40,90,.10)}
  .login .marca{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:22px}
  .login .marca .m{width:46px;height:46px;border-radius:12px;background:var(--amarelo);display:flex;align-items:center;justify-content:center;font-size:24px}
  .login .marca b{font-family:'Baloo 2';font-size:19px;color:var(--azul-esc);display:block;line-height:1}
  .login .marca span{font-size:11px;color:var(--suave);letter-spacing:.5px}
  .login h2{font-size:20px;color:var(--azul-esc);text-align:center;margin-bottom:4px}
  .login p.sub{font-size:13px;color:var(--suave);text-align:center;margin-bottom:22px}
  .login .campo{margin-bottom:14px}
  .erro{background:#fdecea;color:var(--vermelho);font-weight:700;font-size:13px;padding:10px 13px;border-radius:10px;margin-bottom:14px}
  .aviso{background:#fff3d6;color:#9a6b00;font-weight:700;font-size:12.5px;padding:11px 14px;border-radius:11px;line-height:1.45;margin-top:16px}

  /* Layout */
  .app{display:flex;min-height:100vh}
  .sidebar{width:248px;background:var(--azul-esc);color:#fff;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding:4px}
  .logo-mark{width:42px;height:42px;border-radius:11px;background:var(--amarelo);display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo b{font-family:'Baloo 2';font-size:18px;line-height:1.05;display:block}
  .logo span{font-size:11px;opacity:.75;letter-spacing:.5px}
  .navbtn{display:flex;align-items:center;gap:11px;width:100%;background:transparent;border:0;color:#dfe7f7;padding:12px 14px;border-radius:11px;font-size:15px;font-weight:700;text-align:left;transition:.15s}
  .navbtn:hover{background:rgba(255,255,255,.08)}
  .navbtn.ativo{background:var(--amarelo);color:var(--azul-esc)}
  .navbtn .ico{font-size:18px;width:22px;text-align:center}
  .sidebar .rodape{margin-top:auto;display:flex;flex-direction:column;gap:10px}
  .sidebar .usuario{font-size:12px;opacity:.85;padding:8px;line-height:1.5;border-top:1px solid rgba(255,255,255,.12);padding-top:14px}
  .btn-sair{background:rgba(255,255,255,.1);border:0;color:#fff;padding:10px;border-radius:10px;font-weight:700;font-size:13px}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topo{background:var(--card);border-bottom:1px solid var(--borda);padding:18px 30px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}
  .topo h1{font-size:24px;color:var(--azul-esc)}
  .topo p{font-size:13px;color:var(--suave);margin-top:2px}
  .acoes{display:flex;gap:10px;flex-wrap:wrap}
  .conteudo{padding:30px;max-width:1180px;width:100%}
  .selo-modo{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;margin-left:10px;vertical-align:middle}
  .selo-banco{background:#e4f5ea;color:#1c7a42}
  .selo-demo{background:#fff3d6;color:#9a6b00}

  .btn{border:0;border-radius:11px;padding:11px 18px;font-weight:800;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.55;cursor:default;transform:none}
  .btn-azul{background:var(--azul);color:#fff}
  .btn-claro{background:#eef1f9;color:var(--azul)}
  .btn-borda{background:#fff;color:var(--texto);border:1.5px solid var(--borda)}
  .btn-perigo{background:#fdecea;color:var(--vermelho)}
  .btn-bloco{width:100%;justify-content:center;padding:13px}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
  .stat{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:20px}
  .stat .num{font-family:'Baloo 2';font-size:34px;line-height:1;color:var(--azul-esc)}
  .stat .lbl{color:var(--suave);font-weight:700;font-size:14px;margin-top:6px}
  .stat .ico{font-size:24px;margin-bottom:10px;display:inline-flex;width:46px;height:46px;align-items:center;justify-content:center;border-radius:12px}

  .secao-titulo{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:14px;flex-wrap:wrap}
  .secao-titulo h2{font-size:21px;color:var(--azul-esc)}
  .secao-titulo .cont{background:#eef1f9;color:var(--azul);font-weight:800;font-size:13px;padding:3px 11px;border-radius:20px}

  .grid{display:grid;gap:16px}
  .grid-cat{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .grid-livro{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .grid-ativ{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

  .item{background:var(--card);border:1px solid var(--borda);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .item .corpo{padding:15px 16px;flex:1}
  .item .rodape{padding:10px 14px;border-top:1px solid var(--borda);display:flex;gap:8px;background:#fcfcf9}
  .item .rodape .btn-sm{flex:1;justify-content:center}
  .chip{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;padding:4px 10px;border-radius:20px}
  .ponto{width:11px;height:11px;border-radius:50%;display:inline-block}

  .capa{height:120px;display:flex;align-items:flex-end;padding:12px;color:#fff;background-size:cover;background-position:center}
  .capa .preco{background:rgba(0,0,0,.30);backdrop-filter:blur(3px);padding:4px 10px;border-radius:20px;font-weight:800;font-size:14px}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .meta span{background:#f3f3ec;color:var(--suave);font-weight:700;font-size:11px;padding:3px 9px;border-radius:7px}
  .item h3{font-size:17px;line-height:1.2;margin-bottom:5px}
  .item .desc{font-size:13px;color:var(--suave);line-height:1.45}
  .item .sub{font-size:12px;color:var(--suave);font-weight:700}

  .vazio{background:var(--card);border:2px dashed var(--borda);border-radius:16px;padding:46px 20px;text-align:center;color:var(--suave)}
  .vazio .ico{font-size:40px;display:block;margin-bottom:10px}
  .carregando{text-align:center;color:var(--suave);padding:50px;font-weight:700}

  .overlay{position:fixed;inset:0;background:rgba(20,30,60,.45);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:100;overflow:auto}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:560px;box-shadow:0 18px 60px rgba(0,0,0,.25);animation:sobe .2s ease}
  @keyframes sobe{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .modal-topo{padding:20px 24px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between}
  .modal-topo h3{font-size:20px;color:var(--azul-esc)}
  .modal-topo button{background:#f3f3ec;border:0;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--suave)}
  .modal-corpo{padding:22px 24px;display:grid;gap:15px}
  .modal-rodape{padding:16px 24px;border-top:1px solid var(--borda);display:flex;justify-content:flex-end;gap:10px}
  .campo label{display:block;font-weight:800;font-size:13px;margin-bottom:6px;color:#444}
  .campo input,.campo select,.campo textarea{width:100%;padding:11px 13px;border:1.5px solid var(--borda);border-radius:11px;background:#fcfcf9;transition:.15s}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:0;border-color:var(--azul);background:#fff}
  .campo textarea{resize:vertical;min-height:74px}
  .linha{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .cores{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .cores button{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--borda)}
  .cores button.sel{box-shadow:0 0 0 2.5px var(--azul);transform:scale(1.1)}
  .dica{font-size:12px;color:var(--suave);margin-top:4px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--azul-esc);color:#fff;padding:13px 22px;border-radius:14px;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:200;animation:sobe .2s}
  .toast.erro-toast{background:var(--vermelho)}

  @media(max-width:820px){
    .sidebar{position:fixed;left:-260px;z-index:60;transition:.25s;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .sidebar.aberta{left:0}
    .menu-mobile{display:inline-flex!important}
    .conteudo{padding:18px}
    .topo{padding:14px 18px}
    .linha{grid-template-columns:1fr}
  }
  .menu-mobile{display:none;background:#eef1f9;color:var(--azul);border:0;width:42px;height:42px;border-radius:11px;font-size:20px;align-items:center;justify-content:center}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
  .scrim.on{display:block}
</style>
</head>

const demo = {
  _ler(){ try{ const b=localStorage.getItem(CHAVE); if(b) return JSON.parse(b);}catch(e){} return JSON.parse(JSON.stringify(SEMENTE)); },
  _gravar(d){ localStorage.setItem(CHAVE, JSON.stringify(d)); },
};

/* ---- Interface unificada ---- */
const store = {
  modo: TEM_SUPABASE ? 'supabase' : 'demo',
  async list(tabela){
    if(this.modo==='demo'){ return (demo._ler()[tabela]||[]).slice(); }
    const ordem = tabela==='categorias' ? 'ordem' : 'criado_em';
    const { data, error } = await sb.from(tabela).select('*').order(ordem, { ascending:true });
    if(error) throw error; return data||[];
  },
  async create(tabela, obj){
    if(this.modo==='demo'){ const d=demo._ler(); obj.id=uid(tabela[0]); d[tabela].push(obj); demo._gravar(d); return obj; }
    const { data, error } = await sb.from(tabela).insert(obj).select().single();
    if(error) throw error; return data;
  },
  async update(tabela, id, obj){
    if(this.modo==='demo'){ const d=demo._ler(); const i=d[tabela].findIndex(x=>x.id===id); d[tabela][i]={...d[tabela][i],...obj}; demo._gravar(d); return d[tabela][i]; }
    const { data, error } = await sb.from(tabela).update(obj).eq('id', id).select().single();
    if(error) throw error; return data;
  },
  async remove(tabela, id){
    if(this.modo==='demo'){ const d=demo._ler(); d[tabela]=d[tabela].filter(x=>x.id!==id); demo._gravar(d); return; }
    const { error } = await sb.from(tabela).delete().eq('id', id); if(error) throw error;
  },
  async upload(arquivo){
    if(this.modo==='demo'){ return await arquivoParaDataUrl(arquivo); }
    const nome = Date.now()+'_'+arquivo.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const { error } = await sb.storage.from('midia').upload(nome, arquivo, { upsert:false });
    if(error) throw error;
    return sb.storage.from('midia').getPublicUrl(nome).data.publicUrl;
  },
  async sessao(){ if(this.modo==='demo') return { email:'modo-demonstração' }; const { data } = await sb.auth.getUser(); return data.user; },
  async login(email, senha){ const { error } = await sb.auth.signInWithPassword({ email, password:senha }); if(error) throw error; },
  async logout(){ if(this.modo!=='demo') await sb.auth.signOut(); },
};

/* ===================== UTILIDADES ===================== */
function uid(p){ return p + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-3); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cssUrl(u){ u=String(u==null?'':u).trim(); return /^https?:\/\/[^'"()\s]+$/i.test(u)?u:''; }
function safeColor(c){ c=String(c==null?'':c).trim(); return /^#[0-9a-fA-F]{3,8}$|^[a-zA-Z]+$/.test(c)?c:''; }
function brl(n){ if(n===''||n==null||isNaN(n)) return ''; return 'R$ '+Number(n).toFixed(2).replace('.',','); }
function arquivoParaDataUrl(f){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); }); }
function toast(msg, erro){ const t=document.createElement('div'); t.className='toast'+(erro?' erro-toast':''); t.textContent=msg; document.body.appendChild(t); setTimeout(()=>{ t.style.transition='.3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, erro?3000:1800); }

      <button class="btn btn-sm btn-perigo" data-del="livros" data-id="${b.id}"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Excluir</button>
    </div></div>`;
}

function viewAtividades(){ if(!cache.atividades.length) return vazio('<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C22 6.012 17.461 2 12 2Z"/></svg>','Nenhuma atividade cadastrada.'); return `<div class="grid grid-ativ">${cache.atividades.map(cardAtiv).join('')}</div>`; }
function cardAtiv(a){
  return `<div class="item">
    <div class="capa" style="height:80px;background:${a.cor_fundo||'#eee'};align-items:center;justify-content:center;color:${a.cor}">
      <span style="font-family:'Baloo 2';font-weight:800;font-size:15px">${esc(a.tipo||'Atividade')}</span></div>
    <div class="corpo"><h3>${esc(a.titulo)}</h3>
      <div class="meta"><span><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg> ${esc(a.faixa_etaria||'—')}</span><span><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C22 6.012 17.461 2 12 2Z"/></svg> ${esc(a.tipo||'—')}</span>${a.arquivo_url?`<span><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> PDF</span>`:''}</div>
    </div><div class="rodape">
      <button class="btn btn-sm btn-claro" data-edit="atividades" data-id="${a.id}"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Editar</button>
      <button class="btn btn-sm btn-perigo" data-del="atividades" data-id="${a.id}"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Excluir</button>
    </div></div>`;
}

/* ===================== EVENTOS LISTA ===================== */
function ligarBotoesItem(){
  document.querySelectorAll('[data-ir]').forEach(b=> b.onclick=()=>{ irPara(b.dataset.ir); setTimeout(()=>abrirModal(),60); });
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=> abrirModal(b.dataset.edit, b.dataset.id));
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=> excluir(b.dataset.del, b.dataset.id));
}
async function excluir(tabela,id){
  const item = cache[tabela].find(x=>String(x.id)===String(id));
  const nome = item ? (item.nome||item.titulo) : '';
  if(!confirm(`Excluir "${nome}"? Esta ação não pode ser desfeita.`)) return;
  try{ await store.remove(tabela,id); await recarregar(); render(); toast('Excluído com sucesso'); }
  catch(e){ toast('Erro ao excluir: '+e.message, true); }
}

/* ===================== MODAL / FORM ===================== */
function abrirModal(tabela, id){
  tabela = tabela || abaAtual;
  if(tabela==='dashboard') return;
  const editando = !!id;
  const item = editando ? cache[tabela].find(x=>String(x.id)===String(id)) : {};
  let corpo='', titulo='';

  if(tabela==='categorias'){
    titulo = editando?'Editar categoria':'Nova categoria';
    corpo = `
      <div class="campo"><label>Nome da categoria *</label><input id="f_nome" value="${esc(item.nome||'')}" placeholder="Ex.: Histórias da Bíblia"></div>
      <div class="campo"><label>Cor principal</label>${seletorCor('cor', item.cor||'#1f57c3')}</div>
      <div class="campo"><label>Cor de fundo (tom suave)</label>
        <input id="f_cor_fundo" type="color" value="${esc(item.cor_fundo||'#e7efff')}" style="height:46px;padding:4px">
        <div class="dica">Tom claro usado no fundo do selo da categoria.</div></div>
      <div class="campo"><label>Ordem de exibição</label><input id="f_ordem" type="number" value="${esc(item.ordem!=null?item.ordem:'')}" placeholder="Ex.: 1"></div>`;
  }
  else if(tabela==='livros'){
    titulo = editando?'Editar livro':'Cadastrar livro';
    const opts = cache.categorias.map(c=>`<option value="${c.id}" ${String(item.categoria_id)===String(c.id)?'selected':''}>${esc(c.nome)}</option>`).join('');
    corpo = `
      <div class="campo"><label>Título *</label><input id="f_titulo" value="${esc(item.titulo||'')}" placeholder="Ex.: Minha Primeira Bíblia"></div>
      <div class="campo"><label>Categoria</label><select id="f_categoria_id"><option value="">— selecione —</option>${opts}</select></div>
      <div class="campo"><label>Descrição</label><textarea id="f_descricao" placeholder="Breve descrição do livro">${esc(item.descricao||'')}</textarea></div>
      <div class="linha">
        <div class="campo"><label>Faixa etária</label><input id="f_faixa_etaria" value="${esc(item.faixa_etaria||'')}" placeholder="Ex.: 3-6 anos"></div>
        <div class="campo"><label>Tempo de leitura</label><input id="f_tempo_leitura" value="${esc(item.tempo_leitura||'')}" placeholder="Ex.: 10 min/dia"></div>
      </div>
      <div class="linha">
        <div class="campo"><label>Preço (R$) *</label><input id="f_preco" type="number" step="0.01" value="${esc(item.preco!=null?item.preco:'')}" placeholder="49.90"></div>
        <div class="campo"><label>Preço antigo (R$)</label><input id="f_preco_antigo" type="number" step="0.01" value="${esc(item.preco_antigo!=null?item.preco_antigo:'')}" placeholder="69.90"></div>
      </div>
      <div class="linha">
        <div class="campo"><label>Desconto</label><input id="f_desconto" value="${esc(item.desconto||'')}" placeholder="Ex.: -28%"></div>
        <div class="campo"><label>Avaliação (0-5)</label><input id="f_avaliacao" type="number" step="0.1" min="0" max="5" value="${esc(item.avaliacao!=null?item.avaliacao:'')}" placeholder="4.9"></div>
      </div>
      <div class="campo"><label>Imagem da capa</label>
        <input id="f_capa_arquivo" type="file" accept="image/*">
        <input id="f_capa_url" type="hidden" value="${esc(item.capa_url||'')}">
        <div class="dica">Opcional. Se não enviar imagem, usamos as cores abaixo.</div></div>
      <div class="linha">
        <div class="campo"><label>Cor da capa (topo)</label><input id="f_capa_cor1" type="color" value="${esc(item.capa_cor1||'#2f8fd6')}" style="height:46px;padding:4px"></div>
        <div class="campo"><label>Cor da capa (base)</label><input id="f_capa_cor2" type="color" value="${esc(item.capa_cor2||'#1f57c3')}" style="height:46px;padding:4px"></div>
      </div>
      <div class="campo"><label>Link de compra (opcional)</label><input id="f_link_compra" value="${esc(item.link_compra||'')}" placeholder="https://..."></div>`;
  }
  else if(tabela==='atividades'){
    titulo = editando?'Editar atividade':'Nova atividade';
    const opts = TIPOS_ATIV.map(t=>`<option ${item.tipo===t?'selected':''}>${esc(t)}</option>`).join('');
    corpo = `
      <div class="campo"><label>Título *</label><input id="f_titulo" value="${esc(item.titulo||'')}" placeholder="Ex.: Jesus ama as crianças"></div>
      <div class="linha">
        <div class="campo"><label>Tipo</label><select id="f_tipo">${opts}</select></div>
        <div class="campo"><label>Faixa etária</label><input id="f_faixa_etaria" value="${esc(item.faixa_etaria||'')}" placeholder="Ex.: 3 anos"></div>
      </div>
      <div class="campo"><label>Cor</label>${seletorCor('cor', item.cor||'#e8533f')}</div>
      <div class="campo"><label>Cor de fundo (tom suave)</label><input id="f_cor_fundo" type="color" value="${esc(item.cor_fundo||'#fde9e5')}" style="height:46px;padding:4px"></div>
      <div class="campo"><label>Arquivo PDF para imprimir</label>
        <input id="f_arquivo_arquivo" type="file" accept="application/pdf">
        <input id="f_arquivo_url" type="hidden" value="${esc(item.arquivo_url||'')}">
        <div class="dica">Opcional. Envie o PDF que a criança vai imprimir.</div></div>`;
  }

  const ov = document.createElement('div'); ov.className='overlay';
  ov.innerHTML = `<div class="modal">
    <div class="modal-topo"><h3>${titulo}</h3><button id="m_fechar">×</button></div>
    <div class="modal-corpo">${corpo}</div>
    <div class="modal-rodape">
      <button class="btn btn-borda" id="m_cancelar">Cancelar</button>
      <button class="btn btn-azul" id="m_salvar">${editando?'Salvar alterações':'Adicionar'}</button>
    </div></div>`;
  document.body.appendChild(ov);
  const fechar=()=>ov.remove();
  ov.onclick=e=>{ if(e.target===ov) fechar(); };
  ov.querySelector('#m_fechar').onclick=fechar;
  ov.querySelector('#m_cancelar').onclick=fechar;
  ov.querySelector('#m_salvar').onclick=()=> guardar(tabela, id, ov, fechar);
  const primeiro = ov.querySelector('input,select,textarea'); if(primeiro) primeiro.focus();
}

function seletorCor(campo, atual){
  return `<div class="cores" data-campo="${campo}">
    ${PALETA.map(c=>`<button type="button" style="background:${c}" class="${c===atual?'sel':''}" data-cor="${c}"></button>`).join('')}
    <input type="color" id="f_${campo}" value="${esc(atual)}" style="width:36px;height:30px;padding:2px;border-radius:8px;border:0">
  </div>`;
}
document.addEventListener('click', e=>{
  const b = e.target.closest('.cores [data-cor]'); if(!b) return;
  const wrap = b.closest('.cores'); wrap.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel'); wrap.querySelector('input[type=color]').value = b.dataset.cor;
});

function val(ov,id){ const e=ov.querySelector('#'+id); return e?e.value.trim():''; }
function num(ov,id){ const v=val(ov,id); return v===''?null:Number(v); }

async function guardar(tabela, id, ov, fechar){
  const btn = ov.querySelector('#m_salvar'); btn.disabled=true; const txt=btn.textContent; btn.textContent='Salvando…';
  try{
    let obj;
    if(tabela==='categorias'){
      const nome=val(ov,'f_nome'); if(!nome) throw new Error('Informe o nome da categoria');
      obj = { nome, cor:val(ov,'f_cor'), cor_fundo:val(ov,'f_cor_fundo'), ordem:num(ov,'f_ordem')||0 };
    } else if(tabela==='livros'){
      const titulo=val(ov,'f_titulo'); if(!titulo) throw new Error('Informe o título do livro');
      let capa_url = val(ov,'f_capa_url');
      const fa = ov.querySelector('#f_capa_arquivo');
      if(fa && fa.files[0]){ btn.textContent='Enviando imagem…'; capa_url = await store.upload(fa.files[0]); }
      obj = { titulo, categoria_id:val(ov,'f_categoria_id')||null, descricao:val(ov,'f_descricao'),
        faixa_etaria:val(ov,'f_faixa_etaria'), tempo_leitura:val(ov,'f_tempo_leitura'),
        preco:num(ov,'f_preco'), preco_antigo:num(ov,'f_preco_antigo'), desconto:val(ov,'f_desconto'),
        avaliacao:num(ov,'f_avaliacao'), capa_cor1:val(ov,'f_capa_cor1'), capa_cor2:val(ov,'f_capa_cor2'),
        capa_url, link_compra:val(ov,'f_link_compra') };
    } else if(tabela==='atividades'){
      const titulo=val(ov,'f_titulo'); if(!titulo) throw new Error('Informe o título da atividade');
      let arquivo_url = val(ov,'f_arquivo_url');
      const fa = ov.querySelector('#f_arquivo_arquivo');
      if(fa && fa.files[0]){ btn.textContent='Enviando PDF…'; arquivo_url = await store.upload(fa.files[0]); }
      obj = { titulo, tipo:val(ov,'f_tipo'), faixa_etaria:val(ov,'f_faixa_etaria'), cor:val(ov,'f_cor'), cor_fundo:val(ov,'f_cor_fundo'), arquivo_url };
    }
    if(id) await store.update(tabela, id, obj); else await store.create(tabela, obj);
    await recarregar(); fechar(); render(); toast(id?'Alterações salvas':'Adicionado com sucesso');
  }catch(e){ btn.disabled=false; btn.textContent=txt; toast('Erro ao salvar: '+(e.message||e), true); }
}

/* ===================== NAVEGAÇÃO ===================== */
function irPara(aba){ abaAtual=aba; render(); fecharMenu(); }
function fecharMenu(){ document.getElementById('sidebar').classList.remove('aberta'); document.getElementById('scrim').classList.remove('on'); }

/* ===================== EXPORTAR ===================== */
function exportar(){
  const blob=new Blob([JSON.stringify(cache,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='universo-catolico-dados.json'; a.click(); URL.revokeObjectURL(a.href); toast('Backup exportado');
}

/* ===================== INICIALIZAÇÃO ===================== */
function mostrar(tela){
  document.getElementById('telaCarregando').classList.toggle('oculto', tela!=='carregando');
  document.getElementById('telaLogin').classList.toggle('oculto', tela!=='login');
  document.getElementById('app').classList.toggle('oculto', tela!=='app');
}

async function entrarNoApp(usuario){
  mostrar('carregando');
  await recarregar();
  // selo de modo
  const selo = document.getElementById('seloModo');
  if(store.modo==='supabase'){ selo.className='selo-modo selo-banco'; selo.textContent='● Banco de dados'; }
  else { selo.className='selo-modo selo-demo'; selo.textContent='● Modo demonstração'; }
  document.getElementById('infoUsuario').innerHTML = (store.modo==='supabase'
    ? '<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> '+esc(usuario.email)
    : 'Modo demonstração<br><span style="opacity:.7">dados salvos só neste navegador</span>');
  mostrar('app');
  render();
}

async function iniciar(){
  // Conexões de UI
  document.querySelectorAll('button.navbtn').forEach(b=> b.onclick=()=> irPara(b.dataset.aba));
  document.getElementById('btnNovo').onclick=()=> abrirModal();
  document.getElementById('btnExportar').onclick=exportar;
  document.getElementById('abreMenu').onclick=()=>{ document.getElementById('sidebar').classList.add('aberta'); document.getElementById('scrim').classList.add('on'); };
  document.getElementById('scrim').onclick=fecharMenu;
  document.getElementById('btnSair').onclick=async()=>{ await store.logout(); location.reload(); };

  // Login
  document.getElementById('formLogin').onsubmit=async(e)=>{
    e.preventDefault();
    const btn=document.getElementById('btnEntrar'); const err=document.getElementById('loginErro');
    err.classList.add('oculto'); btn.disabled=true; btn.textContent='Entrando…';
    try{
      await store.login(document.getElementById('loginEmail').value.trim(), document.getElementById('loginSenha').value);
      const u = await store.sessao(); await entrarNoApp(u);
    }catch(ex){ err.textContent='Não foi possível entrar: '+(ex.message||ex); err.classList.remove('oculto'); btn.disabled=false; btn.textContent='Entrar'; }
  };

  if(store.modo==='demo'){
    // Sem banco configurado: entra direto em modo demonstração
    const aviso=document.getElementById('loginAviso');
    await entrarNoApp({ email:'modo-demonstração' });
    return;
  }

  // Modo banco: verifica sessão existente
  const u = await store.sessao();
  if(u){ await entrarNoApp(u); }
  else { mostrar('login'); document.getElementById('loginEmail').focus(); }
}

iniciar().catch(e=>{ mostrar('login'); const err=document.getElementById('loginErro'); err.textContent='Erro ao iniciar: '+(e.message||e); err.classList.remove('oculto'); });
</script>
</body>
