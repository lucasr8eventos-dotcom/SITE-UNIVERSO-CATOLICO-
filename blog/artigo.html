<style>

  h1,h2,h3{font-family:'Baloo 2',sans-serif}

  .topo{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--borda);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}

  .marca b{font-family:'Baloo 2';font-size:18px;color:var(--azul-esc);display:block;line-height:1}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script>
const CFG=window.UCK_CONFIG||{};
const OK=!!(CFG.SUPABASE_URL&&CFG.SUPABASE_ANON_KEY&&window.supabase);
const sb=OK?window.supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY):null;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cssUrl(u){ u=String(u==null?'':u).trim(); return /^https?:\/\/[^'"()\s]+$/i.test(u)?u:''; }
function safeColor(c){ c=String(c==null?'':c).trim(); return /^#[0-9a-fA-F]{3,8}$|^[a-zA-Z]+$/.test(c)?c:''; }
async function carregar(){
  const el=document.getElementById('conteudo');
  if(!OK){ el.innerHTML='<div class="vazio">Área em configuração.</div>'; return; }
  const id=new URLSearchParams(location.search).get('id');
  if(!id){ el.innerHTML='<div class="vazio">Artigo não informado.</div>'; return; }
  const { data, error } = await sb.from('artigos').select('*').eq('id',id).eq('ativo',true).maybeSingle();
  if(error||!data){ el.innerHTML='<div class="vazio">Artigo não encontrado.</div>'; return; }
  document.title=data.titulo+' · Universo Católico Kids';
  // Rich snippet: Article para o Google
  try{
    const img=data.capa_url||'https://universocatolicokids.com.br/assets/og-image.png';
    const ld={'@context':'https://schema.org','@type':'Article',headline:data.titulo,description:(data.resumo||''),image:img,inLanguage:'pt-BR',
      author:{'@type':'Organization',name:'Universo Católico Kids'},
      publisher:{'@type':'Organization',name:'Universo Católico Kids',logo:{'@type':'ImageObject',url:'https://universocatolicokids.com.br/assets/og-image.png'}}};
    if(data.criado_em) ld.datePublished=data.criado_em;
    const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(ld);document.head.appendChild(s);
    const md=document.querySelector('meta[name="description"]'); if(md && data.resumo) md.setAttribute('content',data.resumo.slice(0,160));
    const ot=document.querySelector('meta[property="og:title"]'); if(ot) ot.setAttribute('content',data.titulo);
  }catch(e){}
  const fundo=cssUrl(data.capa_url)?`url('${cssUrl(data.capa_url)}')`:`linear-gradient(160deg,${safeColor(data.capa_cor1)||'#2f8fd6'},${safeColor(data.capa_cor2)||'#1f57c3'})`;
  el.innerHTML=`
    <div class="capa" style="background:${fundo}"></div>
    ${data.tag?`<span class="tag">${esc(data.tag)}</span>`:''}
    <h1>${esc(data.titulo)}</h1>
    <div class="info">${esc(data.tempo_leitura||'')}</div>
    <div class="conteudo">${esc(data.conteudo||data.resumo||'')}</div>`;
}
carregar();
</script>
