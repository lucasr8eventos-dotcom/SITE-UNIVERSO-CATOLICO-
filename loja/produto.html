<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Produto · Universo Católico Kids</title>
<meta name="description" content="Materiais católicos para crianças — livros, atividades e infoprodutos.">
<meta property="og:title" content="Universo Católico Kids">
<meta property="og:description" content="Materiais católicos para crianças.">
<meta property="og:type" content="product">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2315418c'/%3E%3Ccircle cx='50' cy='44' r='20' fill='%23f5b21a'/%3E%3Crect x='34' y='66' width='32' height='14' rx='3' fill='%23e8533f'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#1f57c3;--azul-esc:#15418c;--amarelo:#f5b21a;--vermelho:#e8533f;--verde:#2fa15a;--bg:#f6f4ee;--card:#fff;--borda:#eceadf;--texto:#28303f;--suave:#7c8091}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--texto)}
  h1,h2,h3{font-family:'Baloo 2',sans-serif}
  button{font-family:inherit;cursor:pointer} input{font-family:inherit;font-size:15px}
  a{color:var(--azul);text-decoration:none} .oculto{display:none!important}
  .topo{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--borda);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
  .marca{display:flex;align-items:center;gap:11px}
  .marca .m{width:44px;height:44px;border-radius:13px;background:linear-gradient(150deg,#f7c948,#f5941a);display:flex;align-items:center;justify-content:center;font-size:23px;box-shadow:0 6px 16px rgba(245,148,26,.35)}
  .marca b{font-family:'Baloo 2';font-size:18px;color:var(--azul-esc);display:block;line-height:1}
  .marca span{font-size:11px;color:var(--suave);letter-spacing:.5px}
  .btn{border:0;border-radius:12px;padding:11px 18px;font-weight:800;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.6;transform:none;cursor:default}
  .btn-azul{background:var(--azul);color:#fff;box-shadow:0 8px 20px rgba(31,87,195,.28)}
  .btn-verde{background:linear-gradient(150deg,#37b866,#2f9a54);color:#fff;box-shadow:0 8px 20px rgba(47,161,90,.30)}
  .btn-claro{background:#eef1f9;color:var(--azul)}
  .wrap{max-width:960px;margin:0 auto;padding:26px 24px}
  .voltar{color:var(--suave);font-weight:700;font-size:14px;display:inline-block;margin-bottom:16px}
  .prodwrap{display:grid;grid-template-columns:360px 1fr;gap:30px;align-items:start}
  .capa{border-radius:20px;height:300px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:70px;position:relative;box-shadow:0 12px 34px rgba(20,40,90,.12);background-size:cover;background-position:center;position:sticky;top:90px}
  .selo{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.94);color:#333;font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px}
  .info h1{font-size:32px;color:var(--azul-esc);line-height:1.12}
  .precos{display:flex;align-items:baseline;gap:11px;margin:16px 0}
  .preco{font-family:'Baloo 2';font-size:36px;color:var(--verde);font-weight:800}
  .antigo{color:var(--suave);text-decoration:line-through;font-size:18px}
  .off{background:#fde9e5;color:var(--vermelho);font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px}
  .frete{font-size:13px;color:var(--suave);font-weight:700;margin-bottom:16px}
  .cta{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0 18px}
  .confia{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0 22px}
  .confia div{font-size:13px;font-weight:700;color:#54596a;display:flex;align-items:center;gap:6px}
  .descbox{background:#fff;border:1px solid var(--borda);border-radius:18px;padding:24px;box-shadow:0 6px 22px rgba(20,40,90,.05)}
  .descbox h3{font-size:19px;color:var(--azul-esc);margin-bottom:12px}
  .descbox .txt{font-size:15px;line-height:1.7;color:#3a4051;white-space:pre-wrap}
  .carregando,.vazio{text-align:center;color:var(--suave);padding:70px 20px}
  .rodape{text-align:center;padding:30px;color:var(--suave);font-size:13px;border-top:1px solid var(--borda);margin-top:30px}
  .rodape a{margin:0 7px}
  .overlay{position:fixed;inset:0;background:rgba(20,30,60,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto}
  .modal h3{color:var(--azul-esc);margin-bottom:4px}.modal p{color:var(--suave);font-size:14px;margin-bottom:14px}
  .campo{margin-bottom:12px}.campo label{display:block;font-weight:800;font-size:13px;margin-bottom:5px}
  .campo input{width:100%;padding:11px 13px;border:1.5px solid var(--borda);border-radius:11px;background:#fcfcfd}
  .campo input:focus{outline:0;border-color:var(--azul);background:#fff}
  .erro{background:#fdecea;color:var(--vermelho);font-weight:700;font-size:13px;padding:10px 13px;border-radius:10px;margin-bottom:12px}
  .fechar{float:right;background:#f3f3ec;border:0;width:32px;height:32px;border-radius:50%;font-size:17px;color:var(--suave)}
  .seguro{text-align:center;font-size:12px;color:var(--suave);margin-top:12px}
  @media(max-width:760px){.prodwrap{grid-template-columns:1fr}.capa{position:static;height:220px}}
</style>
</head>
<body>
<header class="topo">
  <a href="./" class="marca"><div class="m" style="background:none;box-shadow:none;padding:0"><svg viewBox="0 0 100 100" width="40" height="40" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="22" fill="#15418c"/><circle cx="50" cy="44" r="20" fill="#f5b21a"/><rect x="46.5" y="32" width="7" height="24" rx="2" fill="#15418c"/><rect x="40" y="40" width="20" height="7" rx="2" fill="#15418c"/><rect x="34" y="66" width="32" height="14" rx="3" fill="#e8533f"/><rect x="38" y="69" width="24" height="8" rx="2" fill="#fff"/></svg></div><div><b>Universo Católico</b><span>LOJA DE MATERIAIS</span></div></a>
  <a href="../conta/" class="btn btn-claro">Minha área <svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>
</header>

<div class="wrap">
  <a href="./" class="voltar"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Voltar para a loja</a>
  <div id="conteudo"><div class="carregando">Carregando produto…</div></div>
</div>

<div class="rodape">
  Pagamento seguro via Mercado Pago · Pix, cartão e boleto<br>
  <a href="../legal/privacidade.html">Privacidade</a>·<a href="../legal/termos.html">Termos</a>·<a href="../legal/reembolso.html">Reembolso</a>
</div>

<div id="modal" class="overlay oculto"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/icons.js"></script>
<script src="../config.js"></script>
<script src="../assets/sacola.js"></script>
<script>
const CFG = window.UCK_CONFIG || {};
const OK = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
let sb = OK ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;
let PROD=null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function brl(n){ return n==null?'':'R$ '+Number(n).toFixed(2).replace('.',','); }
const SELO={ infoproduto:'<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg> Acesso digital', fisico:'<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Livro físico', externo:'<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg> Amazon' };

async function carregar(){
  const el=document.getElementById('conteudo');
  if(!OK){ el.innerHTML='<div class="vazio">Loja em configuração.</div>'; return; }
  const id=new URLSearchParams(location.search).get('id');
  const slug=new URLSearchParams(location.search).get('slug');
  if(!id && !slug){ el.innerHTML='<div class="vazio">Produto não informado.</div>'; return; }
  let q=sb.from('produtos').select('*').eq('ativo',true);
  q = id ? q.eq('id',id) : q.eq('slug',slug);
  const { data, error } = await q.maybeSingle();
  if(error||!data){ el.innerHTML='<div class="vazio">Produto não encontrado.</div>'; return; }
  PROD=data;
  const tipo=data.tipo||'infoproduto';
  document.title = data.nome+' · Universo Católico Kids';
  const fundo = data.capa_url ? `url('${esc(data.capa_url)}')` : `linear-gradient(160deg,${data.capa_cor1||'#2f8fd6'},${data.capa_cor2||'#1f57c3'})`;
  const off = (data.preco_antigo && data.preco_antigo>data.preco) ? Math.round((1-data.preco/data.preco_antigo)*100) : 0;
  const cta = tipo==='externo'
    ? `<a class="btn btn-azul" href="${esc(data.link_externo||'#')}" target="_blank" rel="noopener">Ver na Amazon <svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>`
    : `<button class="btn btn-verde" id="btnComprar"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> Adicionar à sacola</button>`;
  const precos = tipo==='externo' ? '' :
    `<div class="precos"><span class="preco">${brl(data.preco)}</span>${data.preco_antigo?`<span class="antigo">${brl(data.preco_antigo)}</span>`:''}${off?`<span class="off">-${off}%</span>`:''}</div>`;
  const frete = (tipo==='fisico') ? `<div class="frete"><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M14 18V6a2 2 0 0 0-2-2H2v14h2"/><path d="M14 9h4l4 4v5h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><path d="M9 18h6"/></svg> Frete: ${data.frete>0?brl(data.frete):'grátis'}</div>` : '';
  const confia = tipo==='infoproduto'
    ? `<div class="confia"><div><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Acesso imediato</div><div><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 0 0 0-8c-2 0-4 1.33-6 4Z"/></svg> Acesso vitalício</div><div><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Pagamento seguro</div></div>`
    : (tipo==='fisico' ? `<div class="confia"><div><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M14 18V6a2 2 0 0 0-2-2H2v14h2"/><path d="M14 9h4l4 4v5h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><path d="M9 18h6"/></svg> Enviamos para todo o Brasil</div><div><svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Pagamento seguro</div></div>` : '');

  el.innerHTML = `
    <div class="prodwrap">
      <div class="capa" style="background-image:${fundo}"><span class="selo">${SELO[tipo]||''}</span>${data.capa_url?'':'<svg xmlns="http://www.w3.org/2000/svg" width="1.15em" height="1.15em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.2em"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'}</div>
      <div class="info">
        <h1>${esc(data.nome)}</h1>
        ${data.descricao_curta?`<p style="color:var(--suave);margin-top:8px;font-size:16px">${esc(data.descricao_curta)}</p>`:''}
        ${precos}
        ${frete}
        <div class="cta">${cta}</div>
        ${confia}
        <div class="descbox">
          <h3>Sobre este material</h3>
          <div class="txt">${esc(data.descricao||'Sem descrição.')}</div>
        </div>
      </div>
    </div>`;
  const bc=document.getElementById('btnComprar'); if(bc) bc.onclick=()=>window.Sacola.add(PROD);
}
carregar();
</script>
</body>
</html>
